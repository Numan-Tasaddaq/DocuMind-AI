<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password - DocuMind AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="change-password.css" />
</head>
<body>
  <main class="change-page">
    <header class="topbar">
      <a href="profile.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Profile</a>
      <button id="logout-btn" class="logout-btn" type="button"><i class="fas fa-right-from-bracket"></i> Logout</button>
    </header>

    <section class="card">
      <h1>Change Password</h1>
      <p class="subtitle">This updates your password in the database.</p>

      <form id="change-password-form" class="form">
        <label for="current-password">Current Password</label>
        <input id="current-password" type="password" required />

        <label for="new-password">New Password</label>
        <input id="new-password" type="password" minlength="8" required />

        <label for="confirm-password">Confirm New Password</label>
        <input id="confirm-password" type="password" minlength="8" required />

        <button type="submit" class="primary-btn">Update Password</button>
      </form>
      <p id="change-message" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script src="change-password.js"></script>
</body>
</html>
