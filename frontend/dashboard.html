<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocuMind AI Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="workspace">
    <aside class="history-rail">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>DocuMind AI</span>
      </div>

      <button id="new-chat-btn" class="new-chat-btn">
        <i class="fas fa-pen-to-square"></i>
        <span>New Chat</span>
      </button>

      <section class="history-block">
        <p class="history-label">Conversation History</p>
        <div id="history-list" class="history-list"></div>
      </section>

      <section class="rail-footer">
        <button id="settings-toggle" class="settings-toggle" type="button" aria-label="Open settings menu">
          <i class="fas fa-gear"></i>
        </button>
        <div id="settings-menu" class="settings-menu hidden">
          <button id="open-profile-view" type="button">
            <i class="fas fa-id-badge"></i>
            Profile
          </button>
          <button id="logout-btn" type="button" class="logout-option">
            <i class="fas fa-right-from-bracket"></i>
            Logout
          </button>
        </div>
      </section>
    </aside>

    <main class="chat-shell">
      <header class="chat-topbar">
        <h1 id="conversation-title">Document Assistant</h1>
      </header>

      <section id="uploaded-files" class="uploaded-files"></section>

      <section id="chat-thread" class="chat-thread" aria-live="polite"></section>

      <form id="chat-form" class="chat-composer">
        <textarea id="chat-input" rows="1" placeholder="Ask a question about your document..." required></textarea>
        <button type="button" id="composer-upload-btn" class="upload-icon-btn" aria-label="Upload documents">
          <i class="fas fa-paperclip"></i>
        </button>
        <button type="submit" class="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
        <input id="doc-upload" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx" multiple hidden />
      </form>
      <section class="quick-actions" aria-label="Quick actions">
        <button type="button" id="summarize-latest-btn" class="quick-action-btn">
          <i class="fas fa-file-lines"></i>
          Summarize Latest
        </button>
      </section>
      <p id="dashboard-message" class="dashboard-message"></p>
    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
